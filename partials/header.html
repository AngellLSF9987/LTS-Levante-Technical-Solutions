<!-- ================= HEADER SUPERIOR ================= -->
    <header class="top-header">
      <div class="container-fluid px-4 px-xl-5">
        <div class="row align-items-center g-3 header-main-row">
          <!-- Logo + nombre empresa -->
          <div class="col-lg-7 header-brand-col">
            <div class="brand-area">
              <img src="assets/img/logo-company.png" alt="Logotipo de Levante Technical Solutions" class="brand-logo"
                data-i18n-alt="brand.logoAlt" />

              <div class="brand-text">
                <h1>
                  <span data-i18n="brand.top">Levante</span>
                  <strong data-i18n="brand.name">Technical Solutions</strong>
                </h1>

                <p>
                  <span data-i18n="brand.claimStart">Soluciones que funcionan,</span>
                  <strong data-i18n="brand.claimStrong">
                    servicios en los que puedes confiar.
                  </strong>
                </p>

                <!-- Contacto rápido visible en cabecera -->
                <nav class="header-contact-bar" aria-label="Contacto rápido">
                  <a href="https://wa.me/34614616135" class="header-contact-link" target="_blank"
                    rel="noopener noreferrer" aria-label="Llamar o escribir por WhatsApp al 614 616 135">
                    <span class="header-contact-icon header-contact-icon-duo" aria-hidden="true">
                      <i class="bi bi-telephone-fill"></i>
                      <i class="bi bi-whatsapp"></i>
                    </span>
                    <span>614 616 135</span>
                  </a>

                  <a href="mailto:levante.tls@gmail.com" class="header-contact-link"
                    aria-label="Enviar correo a levante.tls@gmail.com">
                    <span class="header-contact-icon" aria-hidden="true">
                      <i class="bi bi-envelope-fill"></i>
                    </span>
                    <span>levante.tls@gmail.com</span>
                  </a>

                  <a href="https://www.google.com/search?q=Levante+Technical+Solutions" class="header-contact-link"
                    target="_blank" rel="noopener noreferrer" aria-label="Abrir perfil de empresa en Google">
                    <span class="header-contact-icon" aria-hidden="true">
                      <i class="bi bi-google"></i>
                    </span>
                    <span data-i18n="contact.googleProfileText">Encuéntranos en Google</span>
                  </a>
                </nav>
              </div>
            </div>
          </div>

          <!-- Bloque derecho del header: selector idioma + escudo + valores -->
          <div class="col-lg-5 header-side-col">
            <div class="header-right-zone">
              <!-- Selector de idioma arriba a la derecha con flag-icons -->
              <div class="language-switcher header-language-switcher btn-group" role="group"
                aria-label="Selector de idioma">
                <button type="button" class="btn btn-sm btn-outline-light language-btn active" data-lang="es"
                  aria-label="Cambiar idioma a español" aria-pressed="true">
                  <span class="fi fi-es"></span>
                  <span>ES</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-light language-btn" data-lang="en"
                  aria-label="Change language to English" aria-pressed="false">
                  <span class="fi fi-gb"></span>
                  <span>EN</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-light language-btn" data-lang="de"
                  aria-label="Sprache auf Deutsch ändern" aria-pressed="false">
                  <span class="fi fi-de"></span>
                  <span>DE</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-light language-btn" data-lang="fr"
                  aria-label="Changer la langue en français" aria-pressed="false">
                  <span class="fi fi-fr"></span>
                  <span>FR</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-light language-btn" data-lang="it"
                  aria-label="Cambiare la lingua in italiano" aria-pressed="false">
                  <span class="fi fi-it"></span>
                  <span>IT</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-light language-btn" data-lang="pt"
                  aria-label="Alterar idioma para português" aria-pressed="false">
                  <span class="fi fi-pt"></span>
                  <span>PT</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-light language-btn" data-lang="ru"
                  aria-label="Переключить язык на русский" aria-pressed="false">
                  <span class="fi fi-ru"></span>
                  <span>RU</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-light language-btn" data-lang="pl"
                  aria-label="Zmień język na polski" aria-pressed="false">
                  <span class="fi fi-pl"></span>
                  <span>PL</span>
                </button>
              </div>

              <div class="header-right-panel">
                <img src="assets/img/logo-head-left.png" alt="Trabajo garantizado" class="header-badge-img"
                  data-i18n-alt="header.badgeAlt" />

                <div class="header-separator" aria-hidden="true"></div>

                <div class="header-values-html">
                  <ul>
                    <li>
                      <i class="bi bi-check-circle"></i>
                      <span data-i18n="values.quality">Calidad</span>
                    </li>

                    <li>
                      <i class="bi bi-check-circle"></i>
                      <span data-i18n="values.experience">Experiencia</span>
                    </li>

                    <li>
                      <i class="bi bi-check-circle"></i>
                      <span data-i18n="values.commitment">Compromiso</span>
                    </li>
                  </ul>

                  <p data-i18n-html="values.subtitle">
                    Todo en un solo lugar<br />
                    para tu tranquilidad.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
